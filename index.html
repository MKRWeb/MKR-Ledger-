<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MKR Ledger | Bazar Calculator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-bar">MKR Ledger</div>

    <div class="screen active">
        
                <div class="card form-card">
            <div class="form-group">
                <!-- NEW: Manual Date Input -->
                <input type="date" id="manual-date" onchange="mkr.updateDate()">
                
                <input type="text" id="item-name" placeholder="e.g., Rice (5kg), Fish...">
                <div class="price-row">
                    <input type="number" id="item-price" placeholder="Price (৳)" inputmode="decimal">
                    <button class="btn" onclick="mkr.addItem()">+ Add</button>
                </div>
            </div>
                </div>
        

            <!-- Item Input Section -->
            <div class="form-group">
                <input type="text" id="item-name" placeholder="e.g., Rice (5kg), Fish...">
                <div class="price-row">
                    <input type="number" id="item-price" placeholder="Price (৳)" inputmode="decimal">
                    <button class="btn" onclick="mkr.addItem()">+ Add</button>
                </div>
            </div>
        </div>

        <div class="card receipt-card" id="capture-area">
            <div class="receipt-header">
                <h3>Daily Bazar List</h3>
                <!-- This is just plain text now, so the image generator loves it -->
                <p id="receipt-date" style="margin: 0; color: var(--text-muted); font-size: 14px;"></p>
            </div>
            
            <ul id="item-list" class="receipt-list"></ul>
            
            <div class="receipt-total">
                <span>Grand Total:</span>
                <span id="grand-total">0</span>
            </div>
            <p class="watermark">Calculated via MKR Ledger</p>
        </div>

        <div class="action-grid">
            <button class="btn bg-success" onclick="mkr.downloadJPG()">📥 Save JPG</button>
            <button class="btn bg-primary" onclick="mkr.shareList()">🔗 Share Image</button>
            <button class="btn btn-outline" style="grid-column: span 2;" onclick="mkr.clearList()">🗑️ Clear All</button>
        </div>

    </div>

    <div id="image-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="mkr.closeModal()">&times;</span>
            <p style="text-align: center; font-size: 15px; font-weight: bold; color: var(--primary); margin-bottom: 15px;">
                Long-press the image below to Share or Copy!
            </p>
            <img id="preview-image" src="" alt="Receipt Preview">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
